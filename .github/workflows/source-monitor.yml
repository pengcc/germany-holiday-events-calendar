name: Holiday source monitor

on:
  schedule:
    - cron: "17 7 1 */3 *"
  workflow_dispatch:

permissions:
  contents: read
  issues: write

jobs:
  monitor:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24.16.0
      - name: Enable pnpm
        run: |
          corepack enable
          corepack prepare pnpm@11.5.2 --activate
      - run: pnpm install --frozen-lockfile
      - name: Check source reachability and fingerprints
        continue-on-error: true
        run: pnpm --silent data:monitor > source-report.json
      - name: Open or update the source-monitor issue
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require("fs");
            const title = "Holiday source monitor requires review";
            let report;
            try {
              report = JSON.parse(fs.readFileSync("source-report.json", "utf8"));
            } catch (error) {
              report = {
                checkedAt: new Date().toISOString(),
                sources: [{ sourceId: "monitor", reachable: false, error: String(error) }],
              };
            }
            const today = report.checkedAt.slice(0, 10);
            const attention = report.sources.filter(
              (source) =>
                !source.reachable ||
                source.changed === true ||
                (source.reviewBy && source.reviewBy < today),
            );
            const body = [
              `Read-only source check: ${report.checkedAt}`,
              "",
              "This workflow never changes holiday data or opens a data pull request.",
              "",
              "```json",
              JSON.stringify(report, null, 2),
              "```",
            ].join("\n");
            const existing = await github.paginate(github.rest.issues.listForRepo, {
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: "open",
              per_page: 100,
            });
            const issue = existing.find((item) => item.title === title);
            if (attention.length > 0) {
              if (issue) {
                await github.rest.issues.createComment({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  issue_number: issue.number,
                  body,
                });
              } else {
                await github.rest.issues.create({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  title,
                  body,
                });
              }
            } else if (issue) {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issue.number,
                body: `${body}\n\nAll configured sources are currently healthy.`,
              });
              await github.rest.issues.update({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issue.number,
                state: "closed",
              });
            }
